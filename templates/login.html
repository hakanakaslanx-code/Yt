<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allone AI — Giriş</title>
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Inter', system-ui, sans-serif;
        background: #07080f;
        color: #e0e0e0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }

    /* Animated background */
    body::before {
        content: '';
        position: fixed;
        inset: -50%;
        background:
            radial-gradient(ellipse 60% 50% at 20% 30%, rgba(112,0,255,0.18) 0%, transparent 60%),
            radial-gradient(ellipse 50% 60% at 80% 70%, rgba(0,212,255,0.1) 0%, transparent 60%),
            radial-gradient(ellipse 70% 40% at 50% 50%, rgba(112,0,255,0.06) 0%, transparent 70%);
        animation: bgShift 20s ease-in-out infinite alternate;
        pointer-events: none;
        z-index: 0;
    }

    @keyframes bgShift {
        0%   { transform: translate(0,0) rotate(0deg); }
        50%  { transform: translate(-3%,2%) rotate(2deg); }
        100% { transform: translate(3%,-2%) rotate(-2deg); }
    }

    .login-card {
        position: relative;
        z-index: 1;
        background: rgba(255,255,255,0.04);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 24px;
        padding: 48px 40px;
        width: 100%;
        max-width: 400px;
        backdrop-filter: blur(20px);
        box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    }

    .logo {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 32px;
    }

    .logo-icon {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, #7c00ff, #00d4ff);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        position: relative;
    }

    .logo-icon::after {
        content: '';
        position: absolute;
        inset: -3px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(124,0,255,0.4), rgba(0,212,255,0.2));
        z-index: -1;
        filter: blur(8px);
        animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
        0%, 100% { opacity: 0.5; }
        50% { opacity: 1; }
    }

    .logo h1 {
        font-size: 1.2rem;
        font-weight: 700;
        background: linear-gradient(135deg, #ffffff, #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .logo p {
        font-size: 0.72rem;
        color: rgba(255,255,255,0.4);
        margin-top: 1px;
    }

    h2 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 6px;
        color: #fff;
    }

    .subtitle {
        font-size: 0.82rem;
        color: rgba(255,255,255,0.4);
        margin-bottom: 28px;
    }

    label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        color: rgba(255,255,255,0.45);
        margin-bottom: 8px;
    }

    input[type=password] {
        width: 100%;
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px;
        padding: 14px 16px;
        color: #fff;
        font-family: inherit;
        font-size: 1rem;
        outline: none;
        transition: 0.2s;
        margin-bottom: 20px;
    }

    input[type=password]:focus {
        border-color: rgba(124,0,255,0.6);
        box-shadow: 0 0 0 3px rgba(124,0,255,0.15);
    }

    button[type=submit] {
        width: 100%;
        background: linear-gradient(135deg, #7c00ff, #5500cc);
        border: none;
        border-radius: 12px;
        padding: 15px;
        color: #fff;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
        letter-spacing: 0.3px;
    }

    button[type=submit]:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(124,0,255,0.4);
    }

    .error {
        background: rgba(255,60,60,0.1);
        border: 1px solid rgba(255,60,60,0.3);
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 0.85rem;
        color: #ff6b6b;
        margin-bottom: 20px;
    }

    .footer {
        text-align: center;
        margin-top: 24px;
        font-size: 0.72rem;
        color: rgba(255,255,255,0.2);
    }
</style>
</head>
<body>
<div class="login-card">
    <div class="logo">
        <div class="logo-icon">🤖</div>
        <div>
            <h1>Allone AI</h1>
            <p>YouTube Automation System</p>
        </div>
    </div>

    <h2>Giriş Yap</h2>
    <p class="subtitle">Devam etmek için şifrenizi girin.</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        <label>Şifre</label>
        <input type="password" name="password" placeholder="••••••••" autofocus autocomplete="current-password">
        <button type="submit">Giriş →</button>
    </form>

    <p class="footer">Allone AI v12 — Yetkisiz erişim yasaktır.</p>
</div>
</body>
</html>
